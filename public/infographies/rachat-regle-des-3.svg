<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Infographie Rachat de crédit : la règle des 3 par Crédit Plus">
  <defs>
    <linearGradient id="header2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#292929"/>
    </linearGradient>
    <style>
      .title { font: bold 36px "Arial",sans-serif; fill: #fff; }
      .subtitle { font: 18px "Arial",sans-serif; fill: #fff; opacity: .85; }
      .rule-num { font: bold 64px "Arial",sans-serif; fill: #ea580c; }
      .rule-title { font: bold 22px "Arial",sans-serif; fill: #111827; }
      .rule-value { font: bold 30px "Arial",sans-serif; fill: #111827; }
      .rule-desc { font: 13px "Arial",sans-serif; fill: #6b7280; }
      .label { font: 11px "Arial",sans-serif; fill: #374151; text-transform: uppercase; letter-spacing: .05em; }
      .footer { font: 13px "Arial",sans-serif; fill: #6b7280; }
      .brand { font: bold 14px "Arial",sans-serif; fill: #ea580c; }
      .warn { font: bold 15px "Arial",sans-serif; fill: #111827; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="#f9fafb"/>

  <!-- Header -->
  <rect width="1200" height="120" fill="url(#header2)"/>
  <text x="60" y="55" class="title">Rachat de crédit : la règle des 3</text>
  <text x="60" y="90" class="subtitle">Les 3 conditions cumulatives pour qu'un rachat externe soit rentable</text>

  <!-- 3 rules cards -->
  <g transform="translate(60, 180)">
    <!-- Rule 1 -->
    <g>
      <rect x="0" y="0" width="350" height="280" rx="16" fill="white" stroke="#e5e7eb"/>
      <text x="30" y="80" class="rule-num">1</text>
      <text x="30" y="130" class="label">Écart de taux</text>
      <text x="30" y="170" class="rule-value">≥ 0,7 point</text>
      <text x="30" y="205" class="rule-title">entre votre taux</text>
      <text x="30" y="230" class="rule-title">actuel et le marché</text>
      <text x="30" y="260" class="rule-desc">Ex. 4,10 % actuel vs 3,25 % marché = 0,85 pt ✅</text>
    </g>

    <!-- Rule 2 -->
    <g transform="translate(370, 0)">
      <rect x="0" y="0" width="350" height="280" rx="16" fill="white" stroke="#e5e7eb"/>
      <text x="30" y="80" class="rule-num">2</text>
      <text x="30" y="130" class="label">Capital restant dû</text>
      <text x="30" y="170" class="rule-value">≥ 70 000 €</text>
      <text x="30" y="205" class="rule-title">pour absorber les</text>
      <text x="30" y="230" class="rule-title">frais fixes du rachat</text>
      <text x="30" y="260" class="rule-desc">IRA + dossier + garantie ≈ 5-8 k€</text>
    </g>

    <!-- Rule 3 -->
    <g transform="translate(740, 0)">
      <rect x="0" y="0" width="350" height="280" rx="16" fill="white" stroke="#e5e7eb"/>
      <text x="30" y="80" class="rule-num">3</text>
      <text x="30" y="130" class="label">Durée restante</text>
      <text x="30" y="170" class="rule-value">≥ 7 ans</text>
      <text x="30" y="205" class="rule-title">pour que l'économie</text>
      <text x="30" y="230" class="rule-title">compense les frais</text>
      <text x="30" y="260" class="rule-desc">ROI typique atteint après 6-8 ans</text>
    </g>
  </g>

  <!-- Warning band -->
  <g transform="translate(60, 475)">
    <rect x="0" y="0" width="1080" height="60" rx="12" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="30" y="37" class="warn">Les 3 règles doivent être SIMULTANÉMENT remplies. Si une seule manque, envisager plutôt une renégociation interne (sans frais de rachat).</text>
  </g>

  <!-- Footer -->
  <rect x="0" y="560" width="1200" height="70" fill="#111827"/>
  <text x="60" y="600" fill="#fff" class="footer">Règle empirique du courtage — indicative, ne remplace pas une simulation personnalisée</text>
  <text x="60" y="620" class="brand">credit-plus.fr · ORIAS n°25005566</text>
  <text x="1140" y="610" text-anchor="end" fill="#fff" class="footer" style="opacity:.6">Infographie Crédit Plus · avril 2026</text>
</svg>
